

services:
  db:
    image: postgres:15-alpine
    container_name: agrosnap_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agrosnap}
      POSTGRES_USER: ${POSTGRES_USER:-agrosnap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agrosnap}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrosnap_backend
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-agrosnap}:${POSTGRES_PASSWORD:-agrosnap}@db:5432/${POSTGRES_DB:-agrosnap}
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - model_data:/app/model
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  rasa:
    image: rasa/rasa:3.6.17
    container_name: agrosnap_rasa
    working_dir: /app
    volumes:
      - ./rasa:/app
    command: ["run", "--enable-api", "--cors", "*", "--debug"]
    ports:
      - "5005:5005"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agrosnap_frontend
    volumes:
      - ./frontend:/usr/src/app
    ports:
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=localhost
    command: sh -c "npm install && npx expo start --tunnel"

volumes:
  db_data:
  media_data:
  model_data: 